events { worker_connections 1024; }

http {
    # Define the group of servers to balance traffic across (Upstream Shards)
    upstream watchparty_nodes {
        # Least_conn routes traffic to whichever server has fewer active connections
        least_conn; 
        server watchparty-node-1:8080;
        server watchparty-node-2:8080;
    }

    server {
        listen 80;

        location / {
            proxy_pass http://watchparty_nodes;
            
            # CRUCIAL: These headers enable WebSocket support through Nginx
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "Upgrade";
            
            # Pass along authentic client metadata
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }
}