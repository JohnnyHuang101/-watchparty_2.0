<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚡ Go Watch Party</title>
    <style>
        :root {
            --bg-color: #0f0c29;
            --bg-gradient: linear-gradient(315deg, #0f0c29 0%, #302b63 74%, #24243e 100%);
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --accent-color: #00f2ff; /* Cyberpunk Cyan */
            --accent-glow: 0 0 10px rgba(0, 242, 255, 0.5);
            --text-primary: #ffffff;
            --text-secondary: #aaaaaa;
            --msg-bg-self: rgba(0, 242, 255, 0.15);
            --msg-bg-other: rgba(255, 255, 255, 0.05);
            --font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: var(--font-family);
            background: var(--bg-gradient);
            background-attachment: fixed;
            color: var(--text-primary);
            height: 100vh;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* --- Main Layout Grid --- */
        .container {
            display: grid;
            grid-template-columns: 1fr 350px; /* Video takes rest, Chat takes 350px */
            width: 95vw;
            height: 90vh;
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            border: 1px solid var(--glass-border);
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            overflow: hidden;
        }

        /* --- Video Section --- */
        .video-section {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            border-right: 1px solid var(--glass-border);
            position: relative;
        }

        h2 {
            position: absolute;
            top: 20px;
            left: 30px;
            font-size: 1.5rem;
            letter-spacing: 1px;
            text-transform: uppercase;
            background: linear-gradient(90deg, #fff, #aaa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        video {
            width: 100%;
            max-width: 900px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            outline: none;
            border: 1px solid #333;
        }

        /* --- Chat Section --- */
        .chat-section {
            display: flex;
            flex-direction: column;
            background: var(--glass-bg);
        }

        .chat-header {
            padding: 20px;
            border-bottom: 1px solid var(--glass-border);
            font-weight: bold;
            font-size: 1.1rem;
            color: var(--accent-color);
            text-shadow: var(--accent-glow);
        }

        #chat-box {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            scroll-behavior: smooth;
        }

        /* Custom Scrollbar */
        #chat-box::-webkit-scrollbar { width: 6px; }
        #chat-box::-webkit-scrollbar-track { background: transparent; }
        #chat-box::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 3px; }

        /* --- Messages Styling --- */
        .msg {
            padding: 10px 14px;
            border-radius: 10px;
            font-size: 0.9rem;
            line-height: 1.4;
            max-width: 90%;
            animation: slideIn 0.3s ease-out;
            word-wrap: break-word;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .msg-system {
            align-self: center;
            font-size: 0.8rem;
            color: var(--text-secondary);
            font-style: italic;
            background: rgba(255,255,255,0.05);
            padding: 4px 12px;
            border-radius: 20px;
        }

        .msg-user {
            background: var(--msg-bg-other);
            align-self: flex-start;
            border-bottom-left-radius: 2px;
        }

        .msg-self {
            background: var(--msg-bg-self);
            align-self: flex-end;
            border-bottom-right-radius: 2px;
            text-align: right;
            border: 1px solid rgba(0, 242, 255, 0.3);
        }

        .username {
            font-weight: bold;
            font-size: 0.75rem;
            margin-bottom: 4px;
            display: block;
        }

        /* --- Input Area --- */
        .input-area {
            padding: 20px;
            border-top: 1px solid var(--glass-border);
            display: flex;
            gap: 10px;
        }

        input {
            flex: 1;
            padding: 12px 15px;
            border-radius: 25px;
            border: 1px solid var(--glass-border);
            background: rgba(0,0,0,0.3);
            color: white;
            outline: none;
            transition: 0.3s;
        }

        input:focus {
            border-color: var(--accent-color);
            box-shadow: var(--accent-glow);
        }

        button {
            padding: 0 25px;
            border-radius: 25px;
            border: none;
            background: linear-gradient(135deg, #00f2ff, #00c3ff);
            color: #000;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            text-transform: uppercase;
            font-size: 0.8rem;
            letter-spacing: 1px;
        }

        button:hover {
            transform: scale(1.05);
            box-shadow: 0 0 15px var(--accent-color);
        }

        button:active {
            transform: scale(0.95);
        }

        /* --- Responsive --- */
        @media (max-width: 900px) {
            .container {
                grid-template-columns: 1fr;
                grid-template-rows: 1fr 40%;
            }
            .video-section { border-right: none; border-bottom: 1px solid var(--glass-border); }
        }
    </style>
</head>
<body>

    <div class="container">
        <section class="video-section">
            <h2><span>🎥</span> Watch Party</h2>
            <video id="myVideo" controls>
                <source src="https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/BigBuckBunny.mp4" type="video/mp4">
                Your browser does not support the video tag.
            </video>
        </section>

        <aside class="chat-section">
            <div class="chat-header">LIVE CHAT</div>
            
            <div id="chat-box">
                </div>

            <div class="input-area">
                <input id="msg" type="text" placeholder="Type a message..." autocomplete="off">
                <button onclick="send()">Send</button>
            </div>
        </aside>
    </div>

    <script>
        const socket = new WebSocket("ws://localhost:8080/ws");
        const video = document.getElementById("myVideo");
        const chatBox = document.getElementById("chat-box");
        const inputField = document.getElementById("msg");

        let myUsername = null;
        let isRemoteChange = false;

        // --- UTILS: Generate Cool Colors for Usernames ---
        function getUsernameColor(username) {
            let hash = 0;
            for (let i = 0; i < username.length; i++) {
                hash = username.charCodeAt(i) + ((hash << 5) - hash);
            }
            const h = Math.abs(hash) % 360;
            return `hsl(${h}, 70%, 65%)`; // Pastel/Neon colors
        }

        // --- UTILS: Add Message to UI ---
        function addMessage(type, username, content) {
            const div = document.createElement("div");
            
            if (type === 'system') {
                div.className = "msg msg-system";
                div.innerHTML = content;
            } else {
                const isMe = username === myUsername;
                div.className = `msg ${isMe ? 'msg-self' : 'msg-user'}`;
                
                // Don't show name if it's me
                let nameHtml = "";
                if (!isMe) {
                    const color = getUsernameColor(username || "Anon");
                    nameHtml = `<span class="username" style="color:${color}">${username}</span>`;
                }
                
                div.innerHTML = `${nameHtml}${content}`;
            }

            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        // --- 1. SENDING EVENTS (User Interactions) ---

        video.addEventListener('play', () => {
            if (isRemoteChange) return; 
            sendSignal("play", video.currentTime);
        });

        video.addEventListener('pause', () => {
            if (isRemoteChange) return;
            sendSignal("pause", video.currentTime);
        });

        video.addEventListener('seeked', () => {
            if (isRemoteChange) return;
            sendSignal("seek", video.currentTime);
        });

        function sendSignal(type, time) {
            if(socket.readyState === WebSocket.OPEN){
                socket.send(JSON.stringify({
                    type: type,
                    video_time: time
                }));
            }
        }

        // --- 2. RECEIVER ---

        socket.onmessage = function(event) {
            const data = JSON.parse(event.data);

            if (data.type === "identity") {
                myUsername = data.username;
                addMessage('system', null, `Connected as <b>${myUsername}</b>`);
                return;
            }

            // A. Handle Video Sync Messages
            if (data.type === "play" || data.type === "pause" || data.type === "seek") {
                handleVideoSync(data);
            } 
            // B. Handle Chat Messages
            else if (data.type === "chat") {
                // Use data.username to see who sent it (Remote or Me)
                const senderName = data.username ? data.username : myUsername;
                addMessage('chat', senderName, data.content);
            }
        };

        function handleVideoSync(msg) {
            if (msg.type === "play") {
                isRemoteChange = true;
                if (Math.abs(video.currentTime - msg.video_time) > 0.5) {
                    video.currentTime = msg.video_time; 
                }
                video.play().then(() => {
                    setTimeout(() => isRemoteChange = false, 50); 
                });
                addMessage('system', null, `▶ Video resumed`);

            } else if (msg.type === "pause") {
                isRemoteChange = true;
                video.pause();
                video.currentTime = msg.video_time; 
                setTimeout(() => isRemoteChange = false, 50);
                addMessage('system', null, `⏸ Video paused`);

            } else if (msg.type === "seek") {
                isRemoteChange = true;
                video.currentTime = msg.video_time;
                setTimeout(() => isRemoteChange = false, 50);
                // Optional: Don't spam seek messages
            }
        }

        // --- 3. CONNECTION SETUP ---

        socket.onopen = () => console.log("Connected to Go Server");
        
        // Allow "Enter" key to send
        inputField.addEventListener("keypress", function(event) {
            if (event.key === "Enter") {
                send();
            }
        });

        function send() {
            const val = inputField.value;
            if (!val) return;

            const payload = {
                type: "chat",
                username: myUsername,
                content: val
            };
            socket.send(JSON.stringify(payload));
            inputField.value = "";
        }
    </script>
</body>
</html>
