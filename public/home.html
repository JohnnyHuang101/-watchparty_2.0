<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚡ Go Watch Party</title>
    <style>
        :root {
            --bg-color: #0f0c29;
            --bg-gradient: linear-gradient(315deg, #0f0c29 0%, #302b63 74%, #24243e 100%);
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --accent-color: #00f2ff;
            --accent-glow: 0 0 10px rgba(0, 242, 255, 0.5);
            --text-primary: #ffffff;
            --text-secondary: #aaaaaa;
            --msg-bg-self: rgba(0, 242, 255, 0.15);
            --msg-bg-other: rgba(255, 255, 255, 0.05);
            --font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: var(--font-family);
            background: var(--bg-gradient);
            background-attachment: fixed;
            color: var(--text-primary);
            height: 100vh;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            display: grid;
            grid-template-columns: 1fr 350px;
            width: 95vw;
            height: 90vh;
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            border: 1px solid var(--glass-border);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            overflow: hidden;
        }

        .video-section {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            border-right: 1px solid var(--glass-border);
            position: relative;
        }

        h2 {
            position: absolute;
            top: 20px;
            left: 30px;
            font-size: 1.5rem;
            letter-spacing: 1px;
            text-transform: uppercase;
            background: linear-gradient(90deg, #fff, #aaa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .video-container {
            width: 100%;
            max-width: 900px;
            aspect-ratio: 16/9;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .placeholder-screen {
            width: 100%;
            height: 100%;
            border: 2px dashed rgba(0, 242, 255, 0.3);
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(0, 0, 0, 0.4);
            gap: 15px;
        }

        .placeholder-screen p {
            color: var(--text-secondary);
            font-size: 1.1rem;
        }

        .chat-section {
            display: flex;
            flex-direction: column;
            background: var(--glass-bg);
        }

        .chat-header {
            padding: 20px;
            border-bottom: 1px solid var(--glass-border);
            font-weight: bold;
            font-size: 1.1rem;
            color: var(--accent-color);
            text-shadow: var(--accent-glow);
        }

        #chat-box {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            scroll-behavior: smooth;
        }

        #chat-box::-webkit-scrollbar {
            width: 6px;
        }

        #chat-box::-webkit-scrollbar-track {
            background: transparent;
        }

        #chat-box::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 3px;
        }

        .msg {
            padding: 10px 14px;
            border-radius: 10px;
            font-size: 0.9rem;
            line-height: 1.4;
            max-width: 90%;
            animation: slideIn 0.3s ease-out;
            word-wrap: break-word;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .msg-system {
            align-self: center;
            font-size: 0.8rem;
            color: var(--accent-color);
            font-style: italic;
            background: rgba(0, 242, 255, 0.05);
            padding: 4px 12px;
            border-radius: 20px;
            border: 1px solid rgba(0, 242, 255, 0.2);
        }

        .msg-user {
            background: var(--msg-bg-other);
            align-self: flex-start;
            border-bottom-left-radius: 2px;
        }

        .msg-self {
            background: var(--msg-bg-self);
            align-self: flex-end;
            border-bottom-right-radius: 2px;
            text-align: left;
            border: 1px solid rgba(0, 242, 255, 0.3);
        }

        .username {
            font-weight: bold;
            font-size: 0.75rem;
            margin-bottom: 4px;
            display: block;
        }

        .input-area {
            padding: 20px;
            border-top: 1px solid var(--glass-border);
            display: flex;
            gap: 10px;
        }

        input {
            flex: 1;
            padding: 12px 15px;
            border-radius: 25px;
            border: 1px solid var(--glass-border);
            background: rgba(0, 0, 0, 0.3);
            color: white;
            outline: none;
            transition: 0.3s;
        }

        input:focus {
            border-color: var(--accent-color);
            box-shadow: var(--accent-glow);
        }

        button {
            padding: 0 25px;
            height: 42px;
            border-radius: 25px;
            border: none;
            background: linear-gradient(135deg, #00f2ff, #00c3ff);
            color: #000;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            text-transform: uppercase;
            font-size: 0.8rem;
            letter-spacing: 1px;
        }

        button:hover {
            transform: scale(1.05);
            box-shadow: 0 0 15px var(--accent-color);
        }

        button:active {
            transform: scale(0.95);
        }

        /* Modal Overlays */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(5px);
            justify-content: center;
            align-items: center;
            z-index: 999;
        }

        .modal-content {
            background: #1a153a;
            border: 1px solid var(--accent-color);
            border-radius: 15px;
            padding: 30px;
            width: 450px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            box-shadow: var(--accent-glow);
        }

        .modal-content h3 {
            color: var(--accent-color);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .preview-box {
            width: 100%;
            aspect-ratio: 16/9;
            background: #000;
            border-radius: 8px;
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--text-secondary);
            font-size: 0.9rem;
            border: 1px solid #333;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }

        .modal-actions {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            margin-top: 10px;
        }

        .btn-secondary {
            background: transparent;
            color: white;
            border: 1px solid var(--glass-border);
        }

        .btn-secondary:hover {
            box-shadow: none;
            border-color: white;
        }

        @media (max-width: 900px) {
            .container {
                grid-template-columns: 1fr;
                grid-template-rows: 1fr 40%;
            }

            .video-section {
                border-right: none;
                border-bottom: 1px solid var(--glass-border);
            }
        }
    </style>
</head>

<body>

    <div class="container">
        <section class="video-section">
            <h2><span>🎥</span> Watch Party</h2>
            <div class="video-container" id="mediaContainer">
                <div class="placeholder-screen" id="placeholderScreen">
                    <p>No video active in this watch party session</p>
                    <button onclick="openShareModal()">Share Video Screen</button>
                </div>
            </div>
        </section>

        <aside class="chat-section">
            <div class="chat-header">LIVE CHAT</div>
            <div id="chat-box"></div>
            <div class="input-area">
                <input id="msg" type="text" placeholder="Type a message..." autocomplete="off">
                <button onclick="sendChat()">Send</button>
            </div>
        </aside>
    </div>

    <div class="modal" id="shareModal">
        <div class="modal-content">
            <h3>Share Stream Resource</h3>
            <input type="text" id="videoUrlInput" placeholder="Paste YouTube link...">
            <div class="preview-box" id="previewBox">No source link provided</div>
            <div class="modal-actions">
                <button class="btn-secondary" onclick="closeShareModal()">Cancel</button>
                <button onclick="confirmVideoShare()">Broadcast Stream</button>
            </div>
        </div>
    </div>

    <script>
        const protocol = location.protocol === "https:" ? "wss://" : "ws://";
        const socket = new WebSocket(protocol + location.host + "/ws");

        const mediaContainer = document.getElementById("mediaContainer");
        const placeholderScreen = document.getElementById("placeholderScreen");
        const chatBox = document.getElementById("chat-box");
        const inputField = document.getElementById("msg");

        const shareModal = document.getElementById("shareModal");
        const videoUrlInput = document.getElementById("videoUrlInput");
        const previewBox = document.getElementById("previewBox");

        let myUsername = null;
        let isRemoteChange = false;

        let ytPlayer = null;
        let ytPlayerReady = false;

        // Initialize YouTube Script Loading Engine
        const tag = document.createElement('script');
        tag.src = "https://www.youtube.com/iframe_api";
        var firstScriptTag = document.getElementsByTagName('script')[0];
        firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

        // Utility function to extract the 11-character YouTube Video ID
        function extractYouTubeId(url) {
            const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
            const match = url.match(regExp);
            return (match && match[2].length === 11) ? match[2] : null;
        }

        // Single Unified Input Listener handling the visual image background thumbnail update
        videoUrlInput.addEventListener("input", () => {
            const url = videoUrlInput.value.trim();
            const videoId = extractYouTubeId(url);

            if (videoId) {
                const thumbnailUrl = `https://img.youtube.com/vi/${videoId}/hqdefault.jpg`;
                previewBox.style.backgroundImage = `url('${thumbnailUrl}')`;
                previewBox.innerText = "";
            } else {
                previewBox.style.backgroundImage = "none";
                previewBox.innerText = url ? "Invalid YouTube URL" : "No source link provided";
            }
        });

        function openShareModal() { shareModal.style.display = "flex"; }
        function closeShareModal() {
            shareModal.style.display = "none";
            videoUrlInput.value = "";
            previewBox.style.backgroundImage = "none";
            previewBox.innerText = "No source link provided";
        }

        // --- 1. SEND SIGNAL ENVELOPES UP TO GO ACTOR HUB ---
        function confirmVideoShare() {
            const targetUrl = videoUrlInput.value.trim();
            if (!targetUrl) return;

            if (socket.readyState === WebSocket.OPEN) {
                socket.send(JSON.stringify({
                    type: "video_change",
                    username: myUsername,
                    content: targetUrl
                }));
            }
            closeShareModal();
        }

        function mountVideoPlayer(sourceUrl) {
            const videoId = extractYouTubeId(sourceUrl);
            if (!videoId) {
                addMessage('system', null, `❌ Failed to mount resource: Invalid YouTube link.`);
                return;
            }

            mediaContainer.innerHTML = `<div id="ytPlayer" style="width:100%; height:100%; border-radius:12px;"></div>`;
            ytPlayerReady = false;

            ytPlayer = new YT.Player('ytPlayer', {
                videoId: videoId,
                playerVars: {
                    'autoplay': 0,
                    'controls': 1,
                    'rel': 0,
                    'modestbranding': 1
                },
                events: {
                    'onReady': onPlayerReady,
                    'onStateChange': onPlayerStateChange
                }
            });
        }

        function onPlayerReady(event) {
            ytPlayerReady = true;
        }

        // Capture user events directly from YouTube player layer to pipe up to the cluster network
        function onPlayerStateChange(event) {
            if (isRemoteChange || !ytPlayerReady || !ytPlayer) return;

            const currentTime = ytPlayer.getCurrentTime();

            if (event.data === YT.PlayerState.PLAYING) {
                sendSignal("play", currentTime);
            } else if (event.data === YT.PlayerState.PAUSED) {
                sendSignal("pause", currentTime);
            }
        }

        function sendSignal(type, time) {
            if (socket.readyState === WebSocket.OPEN) {
                socket.send(JSON.stringify({
                    type: type,
                    username: myUsername,
                    video_time: time
                }));
            }
        }

        // --- 2. PACKET CONSUMPTION MANAGER (Cluster Consumer Ingress) ---
        socket.onmessage = function (event) {
            const data = JSON.parse(event.data);

            if (data.type === "identity") {
                myUsername = data.username;
                addMessage('system', null, `Connected as <b>${myUsername}</b>`);
                return;
            }

            if (data.type === "user_leave") {
                addMessage('system', null, data.content);
                return;
            }

            if (data.type === "video_change") {
                mountVideoPlayer(data.content);
                addMessage('system', null, `🎬 New stream resource active inside party`);
                return;
            }

            // Route standard synchronization parameters directly if the player actor instance is active
            if (["play", "pause", "seek"].includes(data.type)) {
                handleVideoSync(data);
            } else if (data.type === "chat") {
                addMessage('chat', data.username, data.content);
            }
        };

        function handleVideoSync(msg) {
            if (!ytPlayer || !ytPlayerReady) return;

            // Check if the message was originally sent by ME
            const isMe = msg.username === myUsername;

            if (msg.type === "play") {
                // Only trigger UI update text if it came from someone else
                if (!isMe) {
                    isRemoteChange = true;
                    if (Math.abs(ytPlayer.getCurrentTime() - msg.video_time) > 0.8) {
                        ytPlayer.seekTo(msg.video_time, true);
                    }
                    ytPlayer.playVideo();
                    setTimeout(() => isRemoteChange = false, 150);
                    addMessage('system', null, `▶ Resumed by ${msg.username}`);
                }

            } else if (msg.type === "pause") {
                if (!isMe) {
                    isRemoteChange = true;
                    ytPlayer.pauseVideo();
                    ytPlayer.seekTo(msg.video_time, true);
                    setTimeout(() => isRemoteChange = false, 150);
                    addMessage('system', null, `⏸ Paused by ${msg.username}`);
                }
            } else if (msg.type === "seek") {
                if (!isMe) {
                    isRemoteChange = true;
                    ytPlayer.seekTo(msg.video_time, true);
                    setTimeout(() => isRemoteChange = false, 150);
                }
            }
        }

        // --- 3. CHAT COMPONENT ROUTING ENGINE ---
        function sendChat() {
            const val = inputField.value.trim();
            if (!val) return;

            socket.send(JSON.stringify({
                type: "chat",
                username: myUsername,
                content: val
            }));
            inputField.value = "";
        }

        function addMessage(type, username, content) {
            const div = document.createElement("div");
            if (type === 'system') {
                div.className = "msg msg-system";
                div.innerHTML = content;
            } else {
                const isMe = username === myUsername;
                div.className = `msg ${isMe ? 'msg-self' : 'msg-user'}`;
                let nameHtml = isMe ? "" : `<span class="username" style="color:${getUsernameColor(username || "Anon")}">${username}</span>`;
                div.innerHTML = `${nameHtml}${content}`;
            }
            chatBox.appendChild(div);

            // Force the scroll adjustment execution right after layout rendering completes
            requestAnimationFrame(() => {
                chatBox.scrollTop = chatBox.scrollHeight;
            });
        }

        function getUsernameColor(username) {
            let hash = 0;
            for (let i = 0; i < username.length; i++) hash = username.charCodeAt(i) + ((hash << 5) - hash);
            return `hsl(${Math.abs(hash) % 360}, 70%, 65%)`;
        }

        inputField.addEventListener("keypress", (e) => { if (e.key === "Enter") sendChat(); });
        socket.onopen = () => console.log("Connected to Go Server Node Network");
    </script>
</body>

</html>
